// Funzioni utility
const formatDate = (date) => {
  return date.toISOString().split('T')[0];
};

const formatDisplayDate = (dateStr) => {
  const date = new Date(dateStr + 'T00:00:00');
  return date.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
};

const generateTimeSlots = () => {
  const slots = [];
  for (let hour = 14; hour < 19; hour++) {
    slots.push(`${hour.toString().padStart(2, '0')}:00`);
    if (hour < 18) {
      slots.push(`${hour.toString().padStart(2, '0')}:30`);
    }
  }
  return slots;
};

// ✅ REGOLA 24H - Verifica se la data è entro 24 ore
const isWithin24Hours = (date) => {
  const now = new Date();
  const selectedDateTime = new Date(date);
  selectedDateTime.setHours(23, 59, 59, 999);
  const diffInHours = (selectedDateTime - now) / (1000 * 60 * 60);
  return diffInHours < 24;
};

// ✅ REGOLA 24H - Verifica se un appuntamento può essere cancellato
const canCancelAppointment = (appointmentDate, appointmentTime) => {
  const now = new Date();
  const appointmentDateTime = new Date(appointmentDate + 'T' + appointmentTime);
  const diffInHours = (appointmentDateTime - now) / (1000 * 60 * 60);
  return diffInHours >= 24;
};

// ✅ EMAIL CORRETTA - Funzione per inviare email
const sendEmailNotification = async (appointmentData) => {
  try {
    const platformName = PLATFORMS[appointmentData.platform]?.name || 'Non specificata';
    
    const templateParams = {
      name: appointmentData.patientName,  // ✅ PARAMETRO RICHIESTO DAL TEMPLATE
      patient_name: appointmentData.patientName,
      patient_email: appointmentData.patientEmail,
      patient_phone: appointmentData.patientPhone,
      service_type: appointmentData.serviceType === 'individual' ? 'Seduta Individuale' : 'Seduta di Coppia',
      appointment_date: formatDisplayDate(appointmentData.date),
      appointment_time: appointmentData.time,
      price: appointmentData.price,
      platform: platformName
    };

    const result = await emailjs.send('service_jo0kg0d', 'template_vttk3n', templateParams);
    console.log('✅ Email inviata con successo:', result);
    return true;
  } catch (error) {
    console.error('❌ Errore invio email:', error);
    return false;
  }
};

// ✅ ESPORTA EXCEL - Esporta appuntamenti in CSV
const exportToCSV = (appointments) => {
  const headers = ['Data', 'Orario', 'Paziente', 'Email', 'Telefono', 'Servizio', 'Piattaforma', 'Prezzo'];
  const rows = appointments.map(apt => [
    apt.date,
    apt.time,
    apt.patientName,
    apt.patientEmail,
    apt.patientPhone,
    apt.serviceName,
    PLATFORMS[apt.platform]?.name || 'N/D',
    `€${apt.price}`
  ]);
  
  let csvContent = headers.join(',') + '\n';
  rows.forEach(row => {
    csvContent += row.map(cell => `"${cell}"`).join(',') + '\n';
  });
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', `appuntamenti_${new Date().toISOString().split('T')[0]}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

  useEffect(() => {

    const savedPassword = localStorage.getItem(PASSWORD_KEY);
    
    if (savedAppointments) {
      setAppointments(JSON.parse(savedAppointments));
    }
    if (savedBlockedSlots) {
      setBlockedSlots(JSON.parse(savedBlockedSlots));
    }
    if (!savedPassword) {
      localStorage.setItem(PASSWORD_KEY, ADMIN_PASSWORD);
    }
  }, []);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appointments));
  }, [appointments]);

  useEffect(() => {
    localStorage.setItem(BLOCKED_SLOTS_KEY, JSON.stringify(blockedSlots));
  }, [blockedSlots]);

  const getWeekDays = (startDate) => {
    const days = [];
    const current = new Date(startDate);
    for (let i = 0; i < 7; i++) {
      days.push(new Date(current));
      current.setDate(current.getDate() + 1);
    }
    return days;
  };

  const nextWeek = () => {
    const newDate = new Date(currentWeekStart);
    newDate.setDate(newDate.getDate() + 7);
    setCurrentWeekStart(newDate);
  };

  const prevWeek = () => {
    const newDate = new Date(currentWeekStart);
    newDate.setDate(newDate.getDate() - 7);
    setCurrentWeekStart(newDate);
  };

  const isSlotBlocked = (date, time) => {
    return blockedSlots.some(
      slot => slot.date === formatDate(date) && slot.time === time
    );
  };

  const isSlotBooked = (date, time) => {
    return appointments.some(
      apt => apt.date === formatDate(date) && apt.time === time
    );
  };

  const timeToMinutes = (time) => {
    const [hours, minutes] = time.split(':').map(Number);
    return hours * 60 + minutes;
  };

  const isSlotOccupiedByDuration = (date, time) => {
    const dateStr = formatDate(date);
    const slotMinutes = timeToMinutes(time);
    
    return appointments.some(apt => {
      if (apt.date !== dateStr) return false;
      
      const aptStartMinutes = timeToMinutes(apt.time);
      const aptEndMinutes = aptStartMinutes + 50;
      const slotEndMinutes = slotMinutes + 50;
      
      return (
        (slotMinutes >= aptStartMinutes && slotMinutes < aptEndMinutes) ||
        (slotEndMinutes > aptStartMinutes && slotEndMinutes <= aptEndMinutes) ||
        (slotMinutes <= aptStartMinutes && slotEndMinutes >= aptEndMinutes)
      );
    });
  };

  const getAvailableSlots = (date) => {
    const dateStr = formatDate(date);
    const allSlots = generateTimeSlots();
    
    return allSlots.map(time => {
      const blocked = isSlotBlocked(date, time);
      const booked = isSlotBooked(date, time);
      const occupiedByDuration = isSlotOccupiedByDuration(date, time);
      
      return {
        time,
        available: !blocked && !booked && !occupiedByDuration,
        blocked,
        booked: booked || occupiedByDuration
      };
    });
  };

    const savedPassword = localStorage.getItem(PASSWORD_KEY) || ADMIN_PASSWORD;

    if (!consentAccepted) {

      return;

    if (isSlotBooked(selectedDate, selectedTime) || 
        isSlotBlocked(selectedDate, selectedTime) || 
        isSlotOccupiedByDuration(selectedDate, selectedTime)) {
      alert('Questo slot non è più disponibile.');
      return;

    const newAppointment = {
      id: Date.now(),
      date: formatDate(selectedDate),
      time: selectedTime,
      serviceType: selectedService,
      serviceName: SERVICES[selectedService].name,
      price: SERVICES[selectedService].price,
      platform: selectedPlatform,
      patientName,
      patientEmail,
      patientPhone,
      status: 'confirmed',

        </div>

        {showChangePasswordModal && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-md w-full">
              <h3 className="text-xl font-bold mb-4">Cambia Password</h3>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Nuova Password</label>
                  <input
                    type="password"
                    value={newPassword}
                    onChange={(e) => setNewPassword(e.target.value)}
                    className="w-full p-2 border rounded"
                    placeholder="Minimo 8 caratteri"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium mb-1">Conferma Password</label>
                  <input
                    type="password"
                    value={confirmPassword}
                    onChange={(e) => setConfirmPassword(e.target.value)}
                    className="w-full p-2 border rounded"
                    placeholder="Ripeti la password"
                  />
                </div>

                <div className="flex gap-3">
                  <button
                    onClick={handleChangePassword}
                    className="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600"
                  >
                    Cambia Password
                  </button>
                  <button
                    onClick={() => {
                      setShowChangePasswordModal(false);
                      setNewPassword('');
                      setConfirmPassword('');
                    }}
                    className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300"
                  >
                    Annulla
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {editingAppointment && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
              <h3 className="text-xl font-bold mb-4">Modifica Appuntamento</h3>
              <p className="mb-4">Paziente: <strong>{editingAppointment.patientName}</strong></p>
              
              <div className="mb-4">
                <label className="block text-sm font-medium mb-2">Nuova Data</label>
                <input
                  type="date"
                  value={formatDate(selectedDate)}
                  onChange={(e) => setSelectedDate(new Date(e.target.value))}
                  className="w-full p-2 border rounded"
                />
              </div>

              <div className="mb-4">
                <label className="block text-sm font-medium mb-2">Nuovo Orario</label>
                <div className="grid grid-cols-4 gap-2">
                  {getAvailableSlots(selectedDate).map(slot => (
                    <button
                      key={slot.time}
                      onClick={() => slot.available && setSelectedTime(slot.time)}
                      disabled={!slot.available}
                      className={`p-2 rounded ${
                        selectedTime === slot.time
                          ? 'bg-blue-500 text-white'
                          : slot.available
                          ? 'bg-gray-100 hover:bg-gray-200'
                          : 'bg-gray-50 text-gray-400 cursor-not-allowed'
                      }`}
                    >
                      {slot.time}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex gap-3">
                <button
                  onClick={saveEditAppointment}
                  className="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600"
                >
                  Salva Modifiche
                </button>
                <button
                  onClick={() => {
                    setEditingAppointment(null);
                    setSelectedTime(null);
                  }}
                  className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300"
                >
                  Annulla
                </button>
              </div>
            </div>
          </div>
        )}

        {showBlockSlotModal && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-md w-full">
              <h3 className="text-xl font-bold mb-4">Blocca Slot Orario</h3>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Data</label>
                  <input
                    type="date"
                    value={blockSlotDate}
                    onChange={(e) => setBlockSlotDate(e.target.value)}
                    className="w-full p-2 border rounded"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium mb-1">Orario</label>
                  <select
                    value={blockSlotTime}
                    onChange={(e) => setBlockSlotTime(e.target.value)}
                    className="w-full p-2 border rounded"
                  >
                    <option value="">Seleziona orario</option>
                    {generateTimeSlots().map(time => (
                      <option key={time} value={time}>{time}</option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-medium mb-1">Motivo (opzionale)</label>
                  <input
                    type="text"
                    value={blockSlotReason}
                    onChange={(e) => setBlockSlotReason(e.target.value)}
                    placeholder="Es: Impegno personale"
                    className="w-full p-2 border rounded"
                  />
                </div>

                <div className="flex gap-3">
                  <button
                    onClick={blockTimeSlot}
                    className="flex-1 bg-orange-500 text-white py-2 rounded hover:bg-orange-600"
                  >
                    Blocca Slot
                  </button>
                  <button
                    onClick={() => {
                      setShowBlockSlotModal(false);
                      setBlockSlotDate('');
                      setBlockSlotTime('');
                      setBlockSlotReason('');
                    }}
                    className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300"
                  >
                    Annulla
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  if (!isAdmin && showPasswordModal) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
          <div className="text-center mb-6">
            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <Lock className="w-8 h-8 text-blue-600" />
            </div>
            <h2 className="text-2xl font-bold text-gray-800">Area Professionista</h2>
            <p className="text-gray-600 mt-2">Inserisci la password per accedere</p>
          </div>
          
          <input
            type="password"
            value={passwordInput}
            onChange={(e) => setPasswordInput(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
            className="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Password"
          />
          
          <div className="flex gap-3">
            <button
              onClick={handleLogin}
              className="flex-1 bg-blue-500 text-white py-3 rounded-lg font-semibold hover:bg-blue-600"
            >
              Accedi
            </button>
            <button
              onClick={() => setShowPasswordModal(false)}
              className="flex-1 bg-gray-200 py-3 rounded-lg font-semibold hover:bg-gray-300"
            >
              Annulla
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
      <div className="max-w-4xl mx-auto">
        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-14 h-14 bg-blue-500 rounded-lg flex items-center justify-center">
                <Calendar className="w-8 h-8 text-white" />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-800">Dr. Vittorio Penzo</h1>
                <p className="text-sm text-gray-600">Psicologo - Prenotazione Online</p>
              </div>
            </div>
            
            {!isAdmin && (
              <button
                onClick={() => setShowPasswordModal(true)}
                className="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 flex items-center gap-2 text-sm"
              >
                <Lock className="w-4 h-4" />
                Area Professionista
              </button>
            )}
          </div>
        </div>

        <div className="bg-white rounded-lg shadow-lg p-6">
          {isAdmin ? <ProfessionalView /> : <PatientView />}
        </div>

        {!isAdmin && (
          <div className="mt-6 text-center text-sm text-gray-600 bg-white rounded-lg p-4">
            <p className="font-semibold mb-2">🔒 Privacy e Riservatezza</p>
            <p>Le tue informazioni personali sono protette e utilizzate esclusivamente per la gestione degli appuntamenti</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<AppointmentSystem />, document.getElementById('root'));
    </script>
</body>
</html>
