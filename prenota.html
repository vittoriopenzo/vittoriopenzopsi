// ─── UTILITY ─────────────────────────────────────────────────────────────────
const formatDate = (date) => date.toISOString().split('T')[0];
const formatDisplayDate = (dateStr) => {
  const date = new Date(dateStr + 'T00:00:00');
  return date.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
};
const isWithin24Hours = (date) => {
  const now = new Date();
  const selectedDateTime = new Date(date);
  selectedDateTime.setHours(23, 59, 59, 999);
  return (selectedDateTime - now) / (1000 * 60 * 60) < 24;
};
const canCancelAppointment = (appointmentDate, appointmentTime) => {
  const now = new Date();
  const appointmentDateTime = new Date(appointmentDate + 'T' + appointmentTime);
  return (appointmentDateTime - now) / (1000 * 60 * 60) >= 24;
};
const exportToCSV = (appointments) => {
  const headers = ['Data', 'Orario', 'Paziente', 'Email', 'Telefono', 'Servizio', 'Piattaforma', 'Prezzo'];
  const rows = appointments.map(apt => [apt.date, apt.time, apt.patientName, apt.patientEmail, apt.patientPhone, apt.serviceName, PLATFORMS[apt.platform]?.name || 'N/D', `€${apt.price}`]);
  let csvContent = headers.join(',') + '\n';
  rows.forEach(row => { csvContent += row.map(cell => `"${cell}"`).join(',') + '\n'; });
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.setAttribute('href', URL.createObjectURL(blob));
  link.setAttribute('download', `appuntamenti_${new Date().toISOString().split('T')[0]}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// ─── COMPONENTE PRINCIPALE ────────────────────────────────────────────────────
function AppointmentSystem() {
  const [isAdmin, setIsAdmin] = useState(false);
  const [passwordInput, setPasswordInput] = useState('');
  const [showPasswordModal, setShowPasswordModal] = useState(false);
  const [showChangePasswordModal, setShowChangePasswordModal] = useState(false);
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');

  const [appointments, setAppointments] = useState([]);
  const [blockedSlots, setBlockedSlots] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [questions, setQuestions] = useState([]);

  const [selectedService, setSelectedService] = useState(null);
  const [selectedDate, setSelectedDate] = useState(new Date());
  const [selectedTime, setSelectedTime] = useState(null);
  const [selectedPlatform, setSelectedPlatform] = useState(null);
  const [currentWeekStart, setCurrentWeekStart] = useState(new Date());

  const [patientName, setPatientName] = useState('');
  const [patientEmail, setPatientEmail] = useState('');
  const [patientPhone, setPatientPhone] = useState('');
  const [consentAccepted, setConsentAccepted] = useState(false);
  const [showConsentModal, setShowConsentModal] = useState(false);
  const [showConfirmation, setShowConfirmation] = useState(false);

  const [editingAppointment, setEditingAppointment] = useState(null);
  const [showBlockSlotModal, setShowBlockSlotModal] = useState(false);
  const [blockSlotDate, setBlockSlotDate] = useState('');
  const [blockSlotTime, setBlockSlotTime] = useState('');
  const [blockSlotReason, setBlockSlotReason] = useState('');

  const [showFAQ, setShowFAQ] = useState(false);
  const [showTestimonials, setShowTestimonials] = useState(false);
  const [expandedFAQ, setExpandedFAQ] = useState(null);

  // Sezioni admin
  const [adminSection, setAdminSection] = useState('appointments'); // 'appointments' | 'questions' | 'settings'

  // Domanda anonima
  const [questionText, setQuestionText] = useState('');
  const [questionNickname, setQuestionNickname] = useState('');
  const [questionSent, setQuestionSent] = useState(false);

  // Impostazioni temporanee nell'admin
  const [tempSettings, setTempSettings] = useState(DEFAULT_SETTINGS);

  // Risposta admin alle domande
  const [replyingTo, setReplyingTo] = useState(null);
  const [replyText, setReplyText] = useState('');

  // ─── FIREBASE LOAD/SAVE ─────────────────────────────────────────────────────
  const [dbReady, setDbReady] = useState(false);

  useEffect(() => {
    // Carica password
    const savedPassword = localStorage.getItem(PASSWORD_KEY);
    if (!savedPassword) localStorage.setItem(PASSWORD_KEY, ADMIN_PASSWORD);

    // Ascolta appuntamenti
    db.ref('appointments').on('value', snap => {
      const val = snap.val();
      setAppointments(val ? Object.values(val) : []);
    });

    // Ascolta slot bloccati
    db.ref('blockedSlots').on('value', snap => {
      const val = snap.val();
      setBlockedSlots(val ? Object.values(val) : []);
    });

    // Ascolta impostazioni
    db.ref('settings').once('value').then(snap => {
      if (!snap.val()) {
        // Prima volta: scrivi i valori default su Firebase
        db.ref('settings').set(DEFAULT_SETTINGS);
      }
    });
    db.ref('settings').on('value', snap => {
      const val = snap.val();
      if (val) {
        setSettings(val);
        setTempSettings(val);
      }
    });

    // Ascolta domande
    db.ref('questions').on('value', snap => {
      const val = snap.val();
      setQuestions(val ? Object.values(val).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)) : []);
    });

    setDbReady(true);

    return () => {
      db.ref('appointments').off();
      db.ref('blockedSlots').off();
      db.ref('settings').off();
      db.ref('questions').off();
    };
  }, []);

  // ─── SERVICES (dinamici dalle impostazioni) ──────────────────────────────────
  const SERVICES = {
    individual: { name: 'Seduta Individuale Online', duration: settings.durationIndividual, price: settings.priceIndividual, icon: User },
    couple: { name: 'Seduta di Coppia Online', duration: settings.durationCouple, price: settings.priceCouple, icon: Users }
  };

  // ─── SLOT GENERATOR (dinamico dagli orari) ───────────────────────────────────
  const generateTimeSlots = () => {
    const slots = [];
    for (let hour = settings.scheduleStart; hour < settings.scheduleEnd; hour++) {
      slots.push(`${hour.toString().padStart(2, '0')}:00`);
      if (hour < settings.scheduleEnd - 1) slots.push(`${hour.toString().padStart(2, '0')}:30`);
    }
    return slots;
  };

  // ─── CALENDARIO ──────────────────────────────────────────────────────────────
  const getWeekDays = (startDate) => {
    const days = [];
    const current = new Date(startDate);
    for (let i = 0; i < 7; i++) { days.push(new Date(current)); current.setDate(current.getDate() + 1); }
    return days;
  };
  const nextWeek = () => { const d = new Date(currentWeekStart); d.setDate(d.getDate() + 7); setCurrentWeekStart(d); };
  const prevWeek = () => { const d = new Date(currentWeekStart); d.setDate(d.getDate() - 7); setCurrentWeekStart(d); };

  const isSlotBlocked = (date, time) => blockedSlots.some(s => s.date === formatDate(date) && s.time === time);
  const isSlotBooked = (date, time) => appointments.some(a => a.date === formatDate(date) && a.time === time);
  const timeToMinutes = (time) => { const [h, m] = time.split(':').map(Number); return h * 60 + m; };
  const isSlotOccupiedByDuration = (date, time) => {
    const dateStr = formatDate(date);
    const slotMin = timeToMinutes(time);
    return appointments.some(apt => {
      if (apt.date !== dateStr) return false;
      const aptStart = timeToMinutes(apt.time);
      const aptEnd = aptStart + apt.duration;
      const slotEnd = slotMin + 50;
      return (slotMin >= aptStart && slotMin < aptEnd) || (slotEnd > aptStart && slotEnd <= aptEnd) || (slotMin <= aptStart && slotEnd >= aptEnd);
    });
  };
  const getAvailableSlots = (date) => {
    const dayOfWeek = date.getDay();
    if (!settings.availableDays.includes(dayOfWeek)) return generateTimeSlots().map(time => ({ time, available: false, blocked: false, booked: false }));
    return generateTimeSlots().map(time => {
      const blocked = isSlotBlocked(date, time);
      const booked = isSlotBooked(date, time);
      const occupied = isSlotOccupiedByDuration(date, time);
      return { time, available: !blocked && !booked && !occupied, blocked, booked: booked || occupied };
    });
  };

  // ─── AUTH ────────────────────────────────────────────────────────────────────
  const handleLogin = () => {
    const savedPwd = localStorage.getItem(PASSWORD_KEY) || ADMIN_PASSWORD;
    if (passwordInput === savedPwd) { setIsAdmin(true); setShowPasswordModal(false); setPasswordInput(''); }
    else alert('Password errata');
  };
  const handleChangePassword = () => {
    if (newPassword !== confirmPassword) { alert('Le password non coincidono'); return; }
    if (newPassword.length < 8) { alert('La password deve essere di almeno 8 caratteri'); return; }
    localStorage.setItem(PASSWORD_KEY, newPassword);
    alert('✅ Password cambiata con successo!');
    setShowChangePasswordModal(false); setNewPassword(''); setConfirmPassword('');
  };

  // ─── PRENOTAZIONE ────────────────────────────────────────────────────────────
  const bookAppointment = async () => {
    if (!selectedService || !selectedDate || !selectedTime || !patientName || !patientEmail || !patientPhone || !selectedPlatform) {
      alert('Compila tutti i campi per prenotare'); return;
    }
    if (!consentAccepted) { alert('⚠️ Devi accettare il consenso informato per procedere con la prenotazione.'); return; }
    if (isSlotBooked(selectedDate, selectedTime) || isSlotBlocked(selectedDate, selectedTime) || isSlotOccupiedByDuration(selectedDate, selectedTime)) {
      alert('Questo slot non è più disponibile.'); return;
    }
    const newAppointment = {
      id: Date.now(),
      date: formatDate(selectedDate),
      time: selectedTime,
      serviceType: selectedService,
      serviceName: SERVICES[selectedService].name,
      price: SERVICES[selectedService].price,
      duration: SERVICES[selectedService].duration,
      platform: selectedPlatform,
      patientName, patientEmail, patientPhone,
      status: 'confirmed',
      createdAt: new Date().toISOString()
    };
    await db.ref('appointments/' + newAppointment.id).set(newAppointment);

    // Notifica Telegram
    const telegramMsg = `🗓 <b>Nuova Prenotazione!</b>\n\n👤 <b>Paziente:</b> ${patientName}\n📧 Email: ${patientEmail}\n📱 Tel: ${patientPhone}\n\n📋 <b>Servizio:</b> ${SERVICES[selectedService].name}\n🖥 <b>Piattaforma:</b> ${PLATFORMS[selectedPlatform].name}\n📅 <b>Data:</b> ${formatDisplayDate(formatDate(selectedDate))}\n⏰ <b>Orario:</b> ${selectedTime}\n💶 <b>Prezzo:</b> €${SERVICES[selectedService].price}`;
    await sendTelegramNotification(telegramMsg);

    setShowConfirmation(true);
    setTimeout(() => {
      setSelectedService(null); setSelectedDate(new Date()); setSelectedTime(null);
      setSelectedPlatform(null); setPatientName(''); setPatientEmail('');
      setPatientPhone(''); setConsentAccepted(false); setShowConfirmation(false);
    }, 5000);
  };

  // ─── GESTIONE APPUNTAMENTI ───────────────────────────────────────────────────
  const deleteAppointment = async (id) => {
    const apt = appointments.find(a => a.id === id);
    if (!canCancelAppointment(apt.date, apt.time)) {
      if (confirm('⚠️ Questo appuntamento è tra meno di 24 ore.\nVuoi procedere comunque con la cancellazione?')) {
        await db.ref('appointments/' + id).remove();
        alert('✅ Appuntamento cancellato. Ricordati di contattare il paziente.');
      }
      return;
    }
    if (confirm('Sei sicuro di voler cancellare questo appuntamento?')) {
      await db.ref('appointments/' + id).remove();
      alert('✅ Appuntamento cancellato con successo.');
    }
  };
  const startEditAppointment = (apt) => {
    setEditingAppointment(apt);
    setSelectedDate(new Date(apt.date + 'T00:00:00'));
    setSelectedTime(apt.time);
  };
  const saveEditAppointment = async () => {
    if (!selectedTime) { alert('Seleziona un nuovo orario'); return; }
    await db.ref('appointments/' + editingAppointment.id).update({ date: formatDate(selectedDate), time: selectedTime });
    setEditingAppointment(null); setSelectedTime(null);
    alert('✅ Appuntamento modificato. Ricordati di avvisare il paziente.');
  };

  // ─── SLOT BLOCCO ─────────────────────────────────────────────────────────────
  const blockTimeSlot = async () => {
    if (!blockSlotDate || !blockSlotTime) { alert('Seleziona data e orario'); return; }
    const newSlot = { id: Date.now(), date: blockSlotDate, time: blockSlotTime, reason: blockSlotReason || 'Impegno personale' };
    await db.ref('blockedSlots/' + newSlot.id).set(newSlot);
    setShowBlockSlotModal(false); setBlockSlotDate(''); setBlockSlotTime(''); setBlockSlotReason('');
  };
  const unblockTimeSlot = async (id) => { if (confirm('Vuoi sbloccare questo slot?')) { await db.ref('blockedSlots/' + id).remove(); } };

  // ─── DOMANDE ANONIME ─────────────────────────────────────────────────────────
  const submitQuestion = async () => {
    if (!questionText.trim()) { alert('Scrivi la tua domanda prima di inviare'); return; }
    const newQuestion = {
      id: Date.now(),
      nickname: questionNickname.trim() || 'Anonimo',
      text: questionText.trim(),
      createdAt: new Date().toISOString(),
      answer: null,
      answeredAt: null
    };
    await db.ref('questions/' + newQuestion.id).set(newQuestion);
    await sendTelegramNotification(`❓ <b>Nuova Domanda Anonima</b>\n\n👤 <b>Da:</b> ${newQuestion.nickname}\n\n💬 <b>Domanda:</b>\n${newQuestion.text}`);
    setQuestionText(''); setQuestionNickname(''); setQuestionSent(true);
    setTimeout(() => setQuestionSent(false), 4000);
  };

  const submitReply = async (questionId) => {
    if (!replyText.trim()) { alert('Scrivi una risposta'); return; }
    await db.ref('questions/' + questionId).update({ answer: replyText.trim(), answeredAt: new Date().toISOString() });
    setReplyingTo(null); setReplyText('');
  };

  const deleteQuestion = async (id) => {
    if (confirm('Eliminare questa domanda?')) { await db.ref('questions/' + id).remove(); }
  };

  // ─── SALVA IMPOSTAZIONI ──────────────────────────────────────────────────────
  const saveSettings = async () => {
    await db.ref('settings').set(tempSettings);
    alert('✅ Impostazioni salvate! Le modifiche sono ora visibili ai pazienti.');

  // ════════════════════════════════════════════════════════════════════════════
  // VISTA PAZIENTE

            <button onClick={() => setShowFAQ(!showFAQ)} className="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 flex items-center gap-2 text-sm">
              <MessageCircle className="w-4 h-4" /> Domande Frequenti
            </button>
            <button onClick={() => setShowTestimonials(!showTestimonials)} className="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 flex items-center gap-2 text-sm">
              <Star className="w-4 h-4" /> Testimonianze
            </button>
          </div>
        </div>

        {showFAQ && (
          <div className="bg-blue-50 border-2 border-blue-200 rounded-lg p-6 mb-6">

                    {faq.question} <span className="text-blue-600">{expandedFAQ === idx ? '−' : '+'}</span>
                  </button>
                  {expandedFAQ === idx && <div className="px-4 pb-4 text-gray-600 text-sm">{faq.answer}</div>}
                </div>

        {showTestimonials && (

                  {getWeekDays(currentWeekStart).map((day, idx) => {
                    const dateStr = formatDate(day);

                        <div className="text-lg font-bold mt-1">{day.getDate()}</div>
                        {within24h && !isPast && <div className="text-xs mt-1 text-red-500">&lt;24h</div>}

            {/* Form dati paziente */}
            {selectedTime && selectedPlatform && (

                      <label className="block text-sm font-medium text-gray-700 mb-1">Nome e Cognome *</label>

                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Telefono *</label>
                      <input type="tel" value={patientPhone} onChange={(e) => setPatientPhone(e.target.value)} autoComplete="off" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="+39 123 456 7890" />
                    </div>
                    <div className="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-4">
                      <div className="flex items-start gap-3">

                      <Check className="w-6 h-6" /> Conferma Prenotazione
                    </button>
                    <p className="text-xs text-gray-500 text-center">Riceverai un'email di conferma con il link per la videochiamata</p>

          </>

        {/* Modali paziente */}
        {showConsentModal && (

                <p>I dati saranno trattati con modalità cartacee ed elettroniche, protetti con adeguate misure di sicurezza, conservati per il tempo necessario (minimo 5 anni per dati sanitari) e resi accessibili solo su richiesta delle Autorità competenti.</p>
                <h4 className="font-bold text-lg mt-6">Diritti dell'interessato</h4>
                <p>L'interessato può esercitare i diritti di accesso, rettifica, cancellazione, limitazione del trattamento e portabilità dei dati secondo gli articoli 15-22 del GDPR.</p>
                <p className="mt-4 text-sm">Per reclami: Garante per la protezione dei dati personali - Piazza Venezia 11, 00187 Roma</p>
                <p className="text-sm">Email: garante@gpdp.it - PEC: protocollo@pec.gpdp.it</p>
              </div>
              <div className="mt-6 flex gap-3">
                <button onClick={() => { setConsentAccepted(true); setShowConsentModal(false); }} className="flex-1 bg-blue-500 text-white py-3 rounded-lg font-semibold hover:bg-blue-600">Ho letto e accetto</button>
                <button onClick={() => setShowConsentModal(false)} className="flex-1 bg-gray-200 py-3 rounded-lg font-semibold hover:bg-gray-300">Chiudi</button>
              </div>
            </div>
          </div>
        )}

        {showConfirmation && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-8 max-w-md w-full text-center">
              <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <Check className="w-10 h-10 text-green-600" />
              </div>
              <h3 className="text-2xl font-bold text-gray-800 mb-3">Prenotazione Confermata!</h3>
              <p className="text-gray-600 mb-4">Grazie {patientName}! Riceverai un'email di conferma a {patientEmail} con il link per la videochiamata su {PLATFORMS[selectedPlatform]?.name}.</p>
              <div className="bg-gray-50 p-4 rounded-lg text-left">
                <p className="text-sm mb-1"><strong>Servizio:</strong> {SERVICES[selectedService]?.name}</p>
                <p className="text-sm mb-1"><strong>Piattaforma:</strong> {PLATFORMS[selectedPlatform]?.name}</p>
                <p className="text-sm mb-1"><strong>Data:</strong> {formatDisplayDate(formatDate(selectedDate))}</p>
                <p className="text-sm mb-1"><strong>Orario:</strong> {selectedTime}</p>
                <p className="text-sm font-bold text-blue-600 mt-2">€{SERVICES[selectedService]?.price}</p>
              </div>
              <p className="text-xs text-gray-500 mt-4">📧 Riceverai un promemoria 24 ore prima dell'appuntamento</p>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════════════════
  // VISTA PROFESSIONISTA
  // ════════════════════════════════════════════════════════════════════════════
  const ProfessionalView = () => {
    const today = new Date();
    const futureAppointments = appointments
      .filter(apt => new Date(apt.date) >= today)
      .sort((a, b) => new Date(a.date + ' ' + a.time) - new Date(b.date + ' ' + b.time));
    const pendingQuestions = questions.filter(q => !q.answer);

    return (
      <div className="space-y-6">
        {/* Header */}
        <div className="flex items-center justify-between">
          <h2 className="text-2xl font-bold text-gray-800">Area Professionista</h2>
          <button onClick={() => setIsAdmin(false)} className="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Esci</button>
        </div>

        {/* Tab navigation */}
        <div className="flex gap-2 border-b border-gray-200 pb-0">
          {[
            { id: 'appointments', label: '📅 Appuntamenti', badge: futureAppointments.length },
            { id: 'questions', label: '💬 Domande', badge: pendingQuestions.length },
            { id: 'settings', label: '⚙️ Impostazioni', badge: null }
          ].map(tab => (
            <button key={tab.id} onClick={() => setAdminSection(tab.id)}
              className={`px-4 py-2 rounded-t-lg font-medium text-sm flex items-center gap-2 transition-all ${adminSection === tab.id ? 'bg-white border-2 border-b-white border-gray-200 text-blue-600 -mb-px' : 'text-gray-500 hover:text-gray-700'}`}>
              {tab.label}
              {tab.badge > 0 && <span className="bg-blue-500 text-white text-xs rounded-full px-2 py-0.5">{tab.badge}</span>}
            </button>
          ))}
        </div>

        {/* ── TAB APPUNTAMENTI ───────────────────────────────────────────────── */}
        {adminSection === 'appointments' && (
          <div className="space-y-4">
            <div className="flex flex-wrap gap-3">
              <button onClick={() => setShowBlockSlotModal(true)} className="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 flex items-center gap-2">
                <Lock className="w-4 h-4" /> Blocca Slot
              </button>
              <button onClick={() => exportToCSV(appointments)} className="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 flex items-center gap-2">
                <Download className="w-4 h-4" /> Esporta in Excel
              </button>
              <button onClick={() => setShowChangePasswordModal(true)} className="px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 flex items-center gap-2">
                <Lock className="w-4 h-4" /> Cambia Password
              </button>
            </div>

            {blockedSlots.length > 0 && (
              <div>
                <h3 className="font-semibold text-gray-800 mb-3">Slot Bloccati ({blockedSlots.length})</h3>
                <div className="space-y-2">
                  {blockedSlots.map(slot => (
                    <div key={slot.id} className="bg-orange-50 border border-orange-200 rounded-lg p-3 flex justify-between items-center">
                      <div>
                        <p className="font-medium">{formatDisplayDate(slot.date)} - {slot.time}</p>
                        <p className="text-sm text-gray-600">{slot.reason}</p>
                      </div>
                      <button onClick={() => unblockTimeSlot(slot.id)} className="p-2 text-red-500 hover:bg-red-50 rounded"><X className="w-5 h-5" /></button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div>
              <h3 className="font-semibold text-gray-800 mb-3">Prossimi Appuntamenti ({futureAppointments.length})</h3>
              <div className="space-y-3">
                {futureAppointments.length === 0 ? (
                  <div className="text-center py-12 bg-gray-50 rounded-lg">
                    <Calendar className="w-12 h-12 mx-auto text-gray-400 mb-3" />
                    <p className="text-gray-600">Nessun appuntamento in programma</p>
                  </div>
                ) : (
                  futureAppointments.map(apt => {
                    const canCancel = canCancelAppointment(apt.date, apt.time);
                    return (
                      <div key={apt.id} className={`bg-white border-2 rounded-lg p-4 ${!canCancel ? 'border-yellow-300' : 'border-gray-200'}`}>
                        <div className="flex items-start justify-between">
                          <div className="flex-1">
                            <div className="flex items-center gap-3 mb-3">
                              <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <User className="w-6 h-6 text-blue-600" />
                              </div>
                              <div>
                                <h3 className="font-semibold text-gray-800 text-lg">{apt.patientName}</h3>
                                <p className="text-sm text-gray-600">{apt.patientEmail}</p>
                                <p className="text-sm text-gray-600">{apt.patientPhone}</p>
                              </div>
                            </div>
                            <div className="space-y-1 bg-gray-50 p-3 rounded">
                              <p className="text-sm"><strong>Servizio:</strong> {apt.serviceName}</p>
                              <p className="text-sm"><strong>Piattaforma:</strong> {PLATFORMS[apt.platform]?.name || 'N/D'}</p>
                              <p className="text-sm"><strong>Data:</strong> {formatDisplayDate(apt.date)}</p>
                              <p className="text-sm"><strong>Orario:</strong> {apt.time}</p>
                              <p className="text-sm font-bold text-blue-600">€{apt.price}</p>
                              {!canCancel && <p className="text-xs text-yellow-700 bg-yellow-100 px-2 py-1 rounded mt-2">⚠️ Appuntamento tra meno di 24 ore</p>}
                            </div>
                          </div>
                          <div className="flex flex-col gap-2">
                            <button onClick={() => startEditAppointment(apt)} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg" title="Modifica">
                              <Edit className="w-5 h-5" />
                            </button>
                            <button onClick={() => deleteAppointment(apt.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg" title="Cancella">
                              <X className="w-5 h-5" />
                            </button>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        )}

        {/* ── TAB DOMANDE ────────────────────────────────────────────────────── */}
        {adminSection === 'questions' && (
          <div className="space-y-4">
            {questions.length === 0 ? (
              <div className="text-center py-12 bg-gray-50 rounded-lg">
                <HelpCircle className="w-12 h-12 mx-auto text-gray-400 mb-3" />
                <p className="text-gray-600">Nessuna domanda ricevuta</p>
              </div>
            ) : (
              <>
                {pendingQuestions.length > 0 && (
                  <div>
                    <h3 className="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                      ⏳ In attesa di risposta ({pendingQuestions.length})
                    </h3>
                    <div className="space-y-3">
                      {pendingQuestions.map(q => (
                        <div key={q.id} className="bg-yellow-50 border-2 border-yellow-200 rounded-xl p-5">
                          <div className="flex items-start justify-between mb-3">
                            <div>
                              <p className="font-semibold text-gray-700 text-sm">👤 {q.nickname}</p>
                              <p className="text-xs text-gray-400">{new Date(q.createdAt).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })}</p>
                            </div>
                            <button onClick={() => deleteQuestion(q.id)} className="p-1 text-red-400 hover:text-red-600"><X className="w-4 h-4" /></button>
                          </div>
                          <p className="text-gray-800 mb-4 bg-white p-3 rounded-lg border">{q.text}</p>
                          {replyingTo === q.id ? (
                            <div className="space-y-2">
                              <textarea value={replyText} onChange={(e) => setReplyText(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 resize-none" rows={3} placeholder="Scrivi la tua risposta pubblica..." />
                              <div className="flex gap-2">
                                <button onClick={() => submitReply(q.id)} className="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 font-medium flex items-center justify-center gap-2">
                                  <Send className="w-4 h-4" /> Pubblica Risposta
                                </button>
                                <button onClick={() => { setReplyingTo(null); setReplyText(''); }} className="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Annulla</button>
                              </div>
                            </div>
                          ) : (
                            <button onClick={() => { setReplyingTo(q.id); setReplyText(''); }} className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 flex items-center gap-2 text-sm">
                              <Edit className="w-4 h-4" /> Rispondi
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {questions.filter(q => q.answer).length > 0 && (
                  <div>
                    <h3 className="font-semibold text-gray-800 mb-3">✅ Risposte pubblicate ({questions.filter(q => q.answer).length})</h3>
                    <div className="space-y-3">
                      {questions.filter(q => q.answer).map(q => (
                        <div key={q.id} className="bg-white border border-gray-200 rounded-xl p-4">
                          <div className="flex items-start justify-between mb-2">
                            <p className="font-semibold text-gray-600 text-sm">👤 {q.nickname}</p>
                            <button onClick={() => deleteQuestion(q.id)} className="p-1 text-red-400 hover:text-red-600"><X className="w-4 h-4" /></button>
                          </div>
                          <p className="text-gray-700 text-sm mb-2 italic">"{q.text}"</p>
                          <div className="bg-blue-50 border-l-4 border-blue-400 p-3 rounded-r-lg">
                            <p className="text-xs font-bold text-blue-600 mb-1">🩺 La tua risposta:</p>
                            <p className="text-gray-700 text-sm">{q.answer}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* ── TAB IMPOSTAZIONI ───────────────────────────────────────────────── */}
        {adminSection === 'settings' && (
          <div className="space-y-6">
            {/* Prezzi */}
            <div className="bg-white border border-gray-200 rounded-xl p-5">
              <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                <span>💶</span> Prezzi Sedute
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Seduta Individuale (€)</label>
                  <input type="number" value={tempSettings.priceIndividual} onChange={(e) => setTempSettings(p => ({ ...p, priceIndividual: parseInt(e.target.value) || 0 }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400" min="0" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Seduta di Coppia (€)</label>
                  <input type="number" value={tempSettings.priceCouple} onChange={(e) => setTempSettings(p => ({ ...p, priceCouple: parseInt(e.target.value) || 0 }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400" min="0" />
                </div>
              </div>
            </div>

            {/* Durata */}
            <div className="bg-white border border-gray-200 rounded-xl p-5">
              <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                <span>⏱</span> Durata Sedute (minuti)
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Seduta Individuale</label>
                  <input type="number" value={tempSettings.durationIndividual} onChange={(e) => setTempSettings(p => ({ ...p, durationIndividual: parseInt(e.target.value) || 50 }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400" min="10" max="120" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Seduta di Coppia</label>
                  <input type="number" value={tempSettings.durationCouple} onChange={(e) => setTempSettings(p => ({ ...p, durationCouple: parseInt(e.target.value) || 50 }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400" min="10" max="120" />
                </div>
              </div>
            </div>

            {/* Orari */}
            <div className="bg-white border border-gray-200 rounded-xl p-5">
              <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                <span>🕐</span> Orari Disponibilità
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Ora Inizio</label>
                  <select value={tempSettings.scheduleStart} onChange={(e) => setTempSettings(p => ({ ...p, scheduleStart: parseInt(e.target.value) }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
                    {Array.from({ length: 13 }, (_, i) => i + 8).map(h => (
                      <option key={h} value={h}>{h.toString().padStart(2, '0')}:00</option>
                    ))}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Ora Fine</label>
                  <select value={tempSettings.scheduleEnd} onChange={(e) => setTempSettings(p => ({ ...p, scheduleEnd: parseInt(e.target.value) }))}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
                    {Array.from({ length: 13 }, (_, i) => i + 9).map(h => (
                      <option key={h} value={h}>{h.toString().padStart(2, '0')}:00</option>
                    ))}
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Giorni Disponibili</label>
                <div className="flex flex-wrap gap-2">
                  {[{ d: 1, n: 'Lunedì' }, { d: 2, n: 'Martedì' }, { d: 3, n: 'Mercoledì' }, { d: 4, n: 'Giovedì' }, { d: 5, n: 'Venerdì' }, { d: 6, n: 'Sabato' }, { d: 0, n: 'Domenica' }].map(({ d, n }) => {
                    const active = tempSettings.availableDays.includes(d);
                    return (
                      <button key={d} onClick={() => setTempSettings(p => ({
                        ...p,
                        availableDays: active ? p.availableDays.filter(x => x !== d) : [...p.availableDays, d]
                      }))} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${active ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                        {n}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Telegram Config */}
            <div className="bg-white border border-gray-200 rounded-xl p-5">
              <h3 className="font-bold text-gray-800 text-lg mb-2 flex items-center gap-2">
                <span>📱</span> Notifiche Telegram
              </h3>
              <p className="text-sm text-gray-500 mb-4">Per configurare le notifiche Telegram, modifica direttamente il file <code className="bg-gray-100 px-1 rounded">prenota.html</code> inserendo il tuo <strong>Bot Token</strong> e <strong>Chat ID</strong> nelle variabili <code className="bg-gray-100 px-1 rounded">TELEGRAM_BOT_TOKEN</code> e <code className="bg-gray-100 px-1 rounded">TELEGRAM_CHAT_ID</code> in cima al codice.</p>
              <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                <p className="text-xs text-gray-500 font-mono">
                  1. Scrivi a @BotFather su Telegram → /newbot<br/>
                  2. Copia il token ricevuto<br/>
                  3. Scrivi un messaggio al tuo bot<br/>
                  4. Vai su: api.telegram.org/bot<b>[TOKEN]</b>/getUpdates<br/>
                  5. Copia il "chat":"id" dal risultato
                </p>
              </div>
            </div>

            <button onClick={saveSettings} className="w-full py-4 bg-green-500 text-white rounded-xl font-bold text-lg hover:bg-green-600 flex items-center justify-center gap-2">
              <Check className="w-6 h-6" /> Salva Tutte le Impostazioni
            </button>
          </div>
        )}

        {/* Modali admin */}
        {showChangePasswordModal && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-md w-full">
              <h3 className="text-xl font-bold mb-4">Cambia Password</h3>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Nuova Password</label>
                  <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} className="w-full p-2 border rounded" placeholder="Minimo 8 caratteri" />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Conferma Password</label>
                  <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} className="w-full p-2 border rounded" placeholder="Ripeti la password" />
                </div>
                <div className="flex gap-3">
                  <button onClick={handleChangePassword} className="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Cambia Password</button>
                  <button onClick={() => { setShowChangePasswordModal(false); setNewPassword(''); setConfirmPassword(''); }} className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300">Annulla</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {editingAppointment && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
              <h3 className="text-xl font-bold mb-4">Modifica Appuntamento</h3>
              <p className="mb-4">Paziente: <strong>{editingAppointment.patientName}</strong></p>
              <div className="mb-4">
                <label className="block text-sm font-medium mb-2">Nuova Data</label>
                <input type="date" value={formatDate(selectedDate)} onChange={(e) => setSelectedDate(new Date(e.target.value))} className="w-full p-2 border rounded" />
              </div>
              <div className="mb-4">
                <label className="block text-sm font-medium mb-2">Nuovo Orario</label>
                <div className="grid grid-cols-4 gap-2">
                  {getAvailableSlots(selectedDate).map(slot => (
                    <button key={slot.time} onClick={() => slot.available && setSelectedTime(slot.time)} disabled={!slot.available}
                      className={`p-2 rounded ${selectedTime === slot.time ? 'bg-blue-500 text-white' : slot.available ? 'bg-gray-100 hover:bg-gray-200' : 'bg-gray-50 text-gray-400 cursor-not-allowed'}`}>
                      {slot.time}
                    </button>
                  ))}
                </div>
              </div>
              <div className="flex gap-3">
                <button onClick={saveEditAppointment} className="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Salva Modifiche</button>
                <button onClick={() => { setEditingAppointment(null); setSelectedTime(null); }} className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300">Annulla</button>
              </div>
            </div>
          </div>
        )}

        {showBlockSlotModal && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg p-6 max-w-md w-full">
              <h3 className="text-xl font-bold mb-4">Blocca Slot Orario</h3>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Data</label>
                  <input type="date" value={blockSlotDate} onChange={(e) => setBlockSlotDate(e.target.value)} className="w-full p-2 border rounded" />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Orario</label>
                  <select value={blockSlotTime} onChange={(e) => setBlockSlotTime(e.target.value)} className="w-full p-2 border rounded">
                    <option value="">Seleziona orario</option>
                    {generateTimeSlots().map(time => <option key={time} value={time}>{time}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Motivo (opzionale)</label>
                  <input type="text" value={blockSlotReason} onChange={(e) => setBlockSlotReason(e.target.value)} placeholder="Es: Impegno personale" className="w-full p-2 border rounded" />
                </div>
                <div className="flex gap-3">
                  <button onClick={blockTimeSlot} className="flex-1 bg-orange-500 text-white py-2 rounded hover:bg-orange-600">Blocca Slot</button>
                  <button onClick={() => { setShowBlockSlotModal(false); setBlockSlotDate(''); setBlockSlotTime(''); setBlockSlotReason(''); }} className="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300">Annulla</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ─── LOGIN MODAL ─────────────────────────────────────────────────────────────
  if (!isAdmin && showPasswordModal) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
        <div className="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
          <div className="text-center mb-6">
            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <Lock className="w-8 h-8 text-blue-600" />
            </div>
            <h2 className="text-2xl font-bold text-gray-800">Area Professionista</h2>
            <p className="text-gray-600 mt-2">Inserisci la password per accedere</p>
          </div>
          <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
            className="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Password" />
          <div className="flex gap-3">
            <button onClick={handleLogin} className="flex-1 bg-blue-500 text-white py-3 rounded-lg font-semibold hover:bg-blue-600">Accedi</button>
            <button onClick={() => setShowPasswordModal(false)} className="flex-1 bg-gray-200 py-3 rounded-lg font-semibold hover:bg-gray-300">Annulla</button>
          </div>
        </div>
      </div>
    );
  }

  // ─── LAYOUT PRINCIPALE ───────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
      <div className="max-w-4xl mx-auto">
        <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-14 h-14 bg-blue-500 rounded-lg flex items-center justify-center">
                <Calendar className="w-8 h-8 text-white" />
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-800">Dr. Vittorio Penzo</h1>
                <p className="text-sm text-gray-600">Psicologo - Prenotazione Online</p>
              </div>
            </div>
            {!isAdmin && (
              <button onClick={() => setShowPasswordModal(true)} className="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 flex items-center gap-2 text-sm">
                <Lock className="w-4 h-4" /> Area Professionista
              </button>
            )}
          </div>
        </div>
        <div className="bg-white rounded-lg shadow-lg p-6">
          {isAdmin ? <ProfessionalView /> : <PatientView />}
        </div>
        {!isAdmin && (
          <div className="mt-6 text-center text-sm text-gray-600 bg-white rounded-lg p-4">
            <p className="font-semibold mb-2">🔒 Privacy e Riservatezza</p>
            <p>Le tue informazioni personali sono protette e utilizzate esclusivamente per la gestione degli appuntamenti</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<AppointmentSystem />, document.getElementById('root'));
    </script>
</body>
</html>
